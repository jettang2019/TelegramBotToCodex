[app]
codex_bin = "codex"
state_path = ".local/state.json"
poll_timeout_seconds = 30
log_level = "INFO"

[[bots]]
name = "repo-a"
token = "123456789:replace-with-your-bot-token"
workdir = "/absolute/path/to/your/workdir"
telegram_username = "@your_telegram_username"
skip_git_repo_check = true

# Optional stronger binding if you want to pin a numeric Telegram user id too.
# telegram_user_id = 123456789

[[bots]]
name = "repo-b"
token = "123456789:replace-with-your-second-bot-token"
workdir = "/absolute/path/to/your/second/workdir"
telegram_username = "@your_telegram_username"
skip_git_repo_check = true
